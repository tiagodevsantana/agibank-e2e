name: CI - E2E Cypress + Allure

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Rodar Cypress
        run: npx cypress run

      - name: Garantir pasta allure-results
        run: mkdir -p allure-results

      - name: Baixar histórico anterior
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copiar histórico
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi

      - name: Add executor info
        run: |
          echo '{
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "E2E Cypress",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' > allure-results/executor.json

      - name: Gerar Allure Report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          keep_files: true
